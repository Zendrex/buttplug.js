name: Preview Release

on:
    pull_request:
        paths:
            - "src/**"
            - "package.json"
            - "bun.lock"
            - "tsconfig.json"
            - "tsdown.config.ts"

permissions: {}

concurrency:
    group: preview-${{ github.ref }}
    cancel-in-progress: true

jobs:
    preview:
        name: Preview Release
        if: github.event.pull_request.head.repo.full_name == github.repository
        runs-on: ubuntu-latest
        timeout-minutes: 5
        permissions:
            pull-requests: write
        steps:
            - uses: actions/checkout@v6
            - uses: ./.github/actions/setup-bun

            - name: Build
              run: bun run build

            - name: Publish preview
              run: bunx pkg-pr-new publish --comment=off --json output.json --packageManager=bun

            - name: Comment on PR
              uses: actions/github-script@v8
              with:
                  script: |
                      const fs = require('fs');
                      const output = JSON.parse(fs.readFileSync('output.json', 'utf8'));
                      const url = output.packages[0].url;
                      const sha = context.payload.pull_request.head.sha;
                      const commitUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/commit/${sha}`;

                      const body = `**Preview published** — install with:

                      **bun**
                      \`\`\`sh
                      bun add ${url}
                      \`\`\`

                      **npm**
                      \`\`\`sh
                      npm install ${url}
                      \`\`\`

                      <sub>Built from [${sha.slice(0, 7)}](${commitUrl})</sub>`;

                      const identifier = '**Preview published**';
                      const { data: comments } = await github.rest.issues.listComments({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        issue_number: context.issue.number,
                      });
                      const existing = comments.find((c) => c.body.includes(identifier));

                      const params = {
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                      };

                      if (existing) {
                        await github.rest.issues.updateComment({ ...params, comment_id: existing.id, body });
                      } else {
                        await github.rest.issues.createComment({ ...params, issue_number: context.issue.number, body });
                      }
